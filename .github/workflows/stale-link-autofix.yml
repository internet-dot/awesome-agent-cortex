name: Stale Link Autofix PR

on:
  workflow_dispatch:
  schedule:
    - cron: '0 8 * * 1' # Mondays 08:00 UTC

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh-links:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Autofix redirecting GitHub links in markdown
        shell: bash
        run: |
          python3 - <<'PY'
          import re
          import urllib.request
          from pathlib import Path

          md_files = [Path('README.md')] + list(Path('guides').glob('**/*.md')) + list(Path('claude').glob('**/*.md'))
          link_pattern = re.compile(r'\((https?://[^)\s]+)\)')

          changed_files = 0
          total_changes = 0

          def resolve(url: str) -> str:
              # Only auto-rewrite GitHub links to avoid accidental semantic changes.
              if 'github.com/' not in url:
                  return url
              try:
                  req = urllib.request.Request(url, method='HEAD', headers={'User-Agent': 'Mozilla/5.0'})
                  with urllib.request.urlopen(req, timeout=12) as r:
                      final = r.geturl()
              except Exception:
                  return url

              # Keep anchors/query from original if the redirect strips them.
              if '#' in url and '#' not in final:
                  final += '#' + url.split('#', 1)[1]
              if '?' in url and '?' not in final:
                  final += '?' + url.split('?', 1)[1]

              # Preserve no-trailing-slash style used in this repo.
              if final.endswith('/') and not url.endswith('/'):
                  final = final[:-1]
              return final

          for path in md_files:
              if not path.exists():
                  continue
              text = path.read_text(encoding='utf-8')
              new_text = text
              local_changes = 0

              urls = sorted(set(link_pattern.findall(text)))
              for u in urls:
                  nu = resolve(u)
                  if nu != u:
                      new_text = new_text.replace(f'({u})', f'({nu})')
                      local_changes += 1

              if local_changes > 0:
                  path.write_text(new_text, encoding='utf-8')
                  changed_files += 1
                  total_changes += local_changes
                  print(f'updated {path}: {local_changes} links')

          print(f'changed_files={changed_files}')
          print(f'total_changes={total_changes}')
          PY

      - name: Create pull request with link refreshes
        uses: peter-evans/create-pull-request@v7
        with:
          branch: chore/stale-link-autofix
          commit-message: "chore: refresh redirected GitHub links"
          title: "chore: stale-link autofix refresh"
          body: |
            Automated link refresh PR.

            What this updates:
            - Rewrites redirected GitHub URLs in markdown files to canonical destinations.
            - Touches README and guide docs only.

            Notes:
            - This workflow intentionally limits auto-edits to GitHub URLs for safety.
          labels: |
            maintenance
            links
          delete-branch: true
