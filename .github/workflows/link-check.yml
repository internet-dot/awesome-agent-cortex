name: Link Check

on:
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * 1' # Mondays 09:00 UTC
  pull_request:
    paths:
      - '**/*.md'
      - '.github/workflows/link-check.yml'
  push:
    branches: [main]
    paths:
      - '**/*.md'
      - '.github/workflows/link-check.yml'

jobs:
  lychee:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run lychee link checker
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --verbose
            --no-progress
            --timeout 20
            --max-retries 2
            --retry-wait-time 2
            --exclude-mail
            --exclude 'https://www.reddit.com/.*'
            --exclude 'https://defillama.com/.*'
            --exclude 'https://www.coinbase.com/.*'
            --exclude 'https://smithery.ai.*'
            --exclude 'https://cursor.directory.*'
            --exclude 'https://spec.modelcontextprotocol.io.*'
            README.md guides/**/*.md claude/**/*.md
          fail: true
